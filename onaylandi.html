<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çiftçihan — E-posta Doğrulandı</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
           background: #F2EFE6; color: #17160F; min-height: 100vh;
           display: flex; align-items: center; justify-content: center; padding: 24px; }
    .kart { background: #fff; border: 1px solid #E6E1D4; border-radius: 20px; padding: 40px 28px;
            max-width: 420px; text-align: center; }
    .tik { width: 72px; height: 72px; border-radius: 22px; background: #EBF1DF;
           display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 38px; }
    h1 { font-size: 22px; margin-bottom: 10px; }
    p { font-size: 15px; color: #6E695B; line-height: 1.6; }
    .marka { margin-top: 26px; font-size: 13px; color: #6E695B; }
    .marka b { color: #4E7A12; }
  </style>
</head>
<body>
  <div class="kart">
    <div class="tik">✅</div>
    <h1>E-postan doğrulandı!</h1>
    <p>Hesabın hazır. Şimdi <b>Çiftçihan</b> uygulamasına dönüp e-posta ve şifrenle giriş yapabilirsin.</p>
    <p class="marka">🌱 <b>Çiftçihan</b> — Çiftliğini cebinden yönet</p>
  </div>
</body>
</html>
